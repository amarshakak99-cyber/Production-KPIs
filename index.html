<head>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body>
  <!-- Add this script right after your opening <body> tag -->
  <script>
    // Prevent share-modal.js errors by safely checking for DOM elements
    (function () {
      // Override addEventListener on null elements globally
      const originalAddEventListener = EventTarget.prototype.addEventListener;
      EventTarget.prototype.addEventListener = function (type, listener, options) {
        if (this === null || this === undefined) {
          console.warn('Attempted to addEventListener on null/undefined');
          return;
        }
        return originalAddEventListener.call(this, type, listener, options);
      };
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
